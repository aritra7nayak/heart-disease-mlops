name: Heart Disease MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MLFLOW_ALLOW_FILE_STORE: "true"
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: heart-disease-api
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Lint & Style Check
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8 (style check)
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,W504,E302,E303,E402,F401,W291,W293,E711,E712 \
            --exclude=__pycache__,.git,venv \
            --count \
            --statistics
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Job 2: Unit Tests
  # ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dataset
        run: python data/download_data.py

      - name: Run preprocessing tests
        run: |
          mkdir -p reports
          pytest tests/test_preprocessing.py -v \
            --tb=short \
            --junit-xml=reports/test_preprocessing.xml
        continue-on-error: false

      - name: Train models (for API & model tests)
        run: python src/train.py
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "sqlite:///mlruns/mlflow.db"

      - name: Run model tests
        run: |
          pytest tests/test_model.py -v \
            --tb=short \
            --junit-xml=reports/test_model.xml

      - name: Run API tests
        run: |
          pytest tests/test_api.py -v \
            --tb=short \
            --junit-xml=reports/test_api.xml

      - name: Run full test suite with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --tb=short

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

  # ──────────────────────────────────────────────────────────────
  # Job 3: Model Training Validation
  # ──────────────────────────────────────────────────────────────
  validate-model:
    name: Model Training Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dataset
        run: python data/download_data.py

      - name: Run full training pipeline
        run: python src/train.py
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "sqlite:///mlruns/mlflow.db"

      - name: Validate model artefacts exist
        run: |
          test -f models/best_model.joblib && echo "best_model.joblib found"
          test -f models/preprocessor.joblib && echo "preprocessor.joblib found"
          test -f models/experiment_summary.json && echo "experiment_summary.json found"

      - name: Validate model performance thresholds
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open("models/experiment_summary.json") as f:
              summary = json.load(f)
          metrics = summary["metrics"]
          roc_auc = metrics.get("roc_auc", 0)
          accuracy = metrics.get("accuracy", 0)
          print(f"ROC-AUC : {roc_auc:.4f}")
          print(f"Accuracy: {accuracy:.4f}")
          assert roc_auc >= 0.75, f"ROC-AUC below threshold: {roc_auc}"
          assert accuracy >= 0.70, f"Accuracy below threshold: {accuracy}"
          print("All performance thresholds passed!")
          PYEOF

      - name: Upload model artefacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artefacts
          path: models/

  # ──────────────────────────────────────────────────────────────
  # Job 4: Docker Build & Test
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: validate-model
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python to generate dataset & models
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare model artefacts
        run: |
          pip install -r requirements.txt
          python data/download_data.py
          python src/train.py
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "sqlite:///mlruns/mlflow.db"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run container & smoke test
        run: |
          docker run -d --name heart-api \
            -p 8000:8000 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 20
          curl -f http://localhost:8000/health && echo "Health check passed"
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":54,"sex":1,"cp":0,"trestbps":130,"chol":245,"fbs":0,"restecg":0,"thalach":150,"exang":0,"oldpeak":1.4,"slope":1,"ca":0,"thal":2}' \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'prediction' in data
          assert data['prediction'] in [0, 1]
          print('Predict endpoint passed:', data)
          "
          docker stop heart-api && docker rm heart-api

  # ──────────────────────────────────────────────────────────────
  # Job 5: Push to Registry (main branch only)
  # ──────────────────────────────────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build artefacts
        run: |
          pip install -r requirements.txt
          python data/download_data.py
          python src/train.py
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
          MLFLOW_TRACKING_URI: "sqlite:///mlruns/mlflow.db"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
