replicaCount: 2

image:
  repository: ghcr.io/your-org/heart-disease-api
  pullPolicy: Always
  tag: "latest"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  host: heart-disease-api.local

monitoring:
  prometheus:
    enabled: true
    scrape: true
    path: /metrics
    port: 8000
